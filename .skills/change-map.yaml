# coding-agent change-map — drop this at the repo root as .skills/change-map.yaml
# Derived from coding-agent/CLAUDE.md "Change-propagation map".
version: 1
couplings:
  - id: ollama-model-tag
    trigger: Changed an Ollama model / tag
    must_update:
      - scripts/pull-models.sh
      - scripts/pull-models.ps1
      - src/code_context/config.py   # embed_model, notes_model, rollup_model
      - scripts/golden.sh
      - scripts/golden.ps1
      - README.md
      - architecture.md
    notes: >
      Keep the .sh and .ps1 pairs in sync. The config.py default embed_model,
      notes_model and rollup_model must each appear in the pull list.

  - id: embedding-model-dimension
    trigger: Changed the embedding model or its dimension
    must_update:
      - src/code_context/config.py            # embed_dim
      - src/code_context/migrations/0001_initial_schema.sql   # vector(N)
      - CODE_CONTEXT_EMBED_DIM
    notes: Swapping the embed model changes both the dim and the vector column.

  - id: new-mcp-tool-or-config-env
    trigger: Added a new MCP tool or config env var
    must_update:
      - architecture.md
      - README.md
      - the tool's stub / impl
      - .env.example            # every Settings field is env-settable → the template is the
                                # only place an operator discovers the knob (drift-lint check 6)

  - id: new-dependency
    trigger: Added a new dependency
    must_update:
      - pyproject.toml
      - uv.lock
      - .github/workflows/ci.yml   # an OPTIONAL extra is only installed if `uv sync` names it
    revalidate:
      - uv sync --locked

  - id: analyzer-provider
    trigger: Added or changed an analyzer provider (the llm.py CLOUD_PREFIX routing)
    must_update:
      - src/code_context/llm.py
      - scripts/check-consistency.sh   # is_cloud_model() — else the lint reads it as an Ollama tag
      - .env.example
      - architecture.md                # §Model use during indexing + the llm.py row
      - README.md
    notes: >
      A provider is selected by a prefix on the model string, so every place that treats a model
      string as an Ollama tag has to learn the prefix. The pull-list checks (4, 5) skip cloud
      models; a provider the lint does not know would be reported as an un-pulled tag.

  - id: docs-source-format
    trigger: Added a document format to the docs ingest
    must_update:
      - src/code_context/indexer/__init__.py   # _DOC_SUFFIXES + the _parse_document dispatch
      - src/code_context/indexer/docs.py       # the parser/converter for it
      - pyproject.toml                         # the reader library, in the [docs] extra
      - architecture.md                        # §Docs ingest
      - README.md
      - src/code_context/dev.py                # the `ingest` usage line
    notes: >
      The glob (_DOC_SUFFIXES) and the dispatch are separate reads of the same list — a format in
      one but not the other is either silently skipped or crashes on an unknown suffix. Binary
      formats convert to markdown and archive it as Layer 1; keep that seam rather than parsing
      the binary straight to sections.

  - id: ai-life-lifecycle-handshake
    trigger: Changed the C-6a handshake (lifecycle.py — profile names, endpoint, ordering, flags)
    ssot: src/code_context/lifecycle.py
    must_update:
      - tests/test_lifecycle.py    # the ordering IS the contract — assert it, don't comment it
      - .env.example
      - architecture.md            # §Contours (as-built) + the event vocabulary
      - README.md
      - plans/STATUS.md            # §Cross-repo pending — the other side cannot see this diff
      - ../ai-life/plans/lifecycle.md   # §LC-4, the other end of the wire (a DIFFERENT repo/PR)
    notes: >
      The only cross-repo contract this repo has. No CI on either side can see the other, so the
      halves drift silently by default: ours is the caller, ai-life's /v1/model-profile is the
      endpoint, and a 2xx is the *confirmation* that its model is evicted — not an ack. Anything
      else (including the 404 when ai-life's own flag is off) must keep reading as a refusal that
      fails the coder run; "carry on anyway" is the over-budget load the handshake exists to
      prevent.

  - id: opencode-wiring
    trigger: Changed how the work machine reaches opencode (install, provider/gateway, MCP entry)
    ssot: scripts/work-win.ps1
    must_update:
      - README.md              # §Use it on a work machine — the script AND its portable form
      - winget-packages.json   # the shell has to be installable, not just configurable
      - .env.example           # CODE_CONTEXT_OPENAI_* — the gateway the analyzer shares with the shell
      - architecture.md        # the Shell bullet in §The product
    notes: >
      Two consumers reach one gateway: opencode (the model the agent thinks with, an
      `@ai-sdk/openai-compatible` provider block) and llm.py's `openai:` tier (the optional
      enrich/rollup notes). They share the URL and the key, so changing one side's story without
      the other leaves an operator configuring half a machine. The KEY is never a script
      parameter and never a literal in opencode.json — it is `{env:CODE_CONTEXT_OPENAI_API_KEY}`,
      resolved from the environment, for the same reason llm.py keeps it out of Settings.

  - id: skills-pointer
    trigger: Changed the reusable-skills wiring
    must_update:
      - CLAUDE.md (Reusable dev-workflow skills block)
      - .skills/change-map.yaml
    notes: The tools/agent-skills pointer + index must exist and match across docs.
